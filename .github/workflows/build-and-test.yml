name: Build and test

on:
  - push
  - pull_request
  - workflow_dispatch

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: "Ubuntu"
            runner: ubuntu-latest
          - name: "macOS"
            runner: macos-latest
          - name: "Windows"
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    steps:
    - name: Install dependencies
      if: ${{ matrix.name == 'Ubuntu' }}
      run: |
        sudo apt-get update; 
        sudo apt-get install --assume-yes \
          libx11-dev \
          libx11-xcb-dev \
          libgl1-mesa-dev \
          libxcb1-dev \
          libxcb-dri2-0-dev \
          libxcb-icccm4-dev \
          libxcursor-dev \
          libwayland-dev
          
    - uses: actions/checkout@v6
    
    - name: Build
      run: cargo build --all-features --verbose
    - name: Run tests
      run: cargo test --all-features --verbose
